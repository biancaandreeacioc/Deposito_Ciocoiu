<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="EsPom_g3.css">
    </head>
    <body>
        <!-- questo è il posizionamento relativo -->
        <div class="contenitore">
            <!-- questo è il posizionamento assoluto -->
            <div class="box">Elemento</div>
        </div>

        <!-- questo per la griglia 
         bisognerebbe usare solo item.
         ne ho usati 3 diversi per capire i colori-->
        <div class="container">
            <div class="item1">1</div>
            <div class="item2">2</div>
            <div class="item">3</div>
        </div>

        <!-- questo è per il flex -->
         <div class="container_flex">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
         </div>
       
         <!-- questo è per creare una griglia base con colonne e gap 
          mostra come si può controllare manualmente la posizione e 
          l'estensione degli elementi-->
         <div class="container_col_gap">
            <div class="item item3">A</div>
            <div class="item item4">B</div>
            <div class="item">C</div>
         </div>

         <!-- qui provo la griglia ad area -->
         <div class="container_area">
            <div class="header">Header</div>
            <div class="sidebar">Sidebar</div>
            <div class="content">Content</div>
            <div class="footer">Footer</div>
         </div>
    </body>
</html>
