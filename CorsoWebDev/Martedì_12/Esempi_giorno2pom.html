<!DOCTYPE html>

<html lang="it">
    <head>
        <meta charset="utf-8"> <!--a favore del browser-->
        <meta name="description" content="Esempio di pagina HTML">
        <meta name="author" content="Nome autore">
        <!--viewport dice al browser che può riadattarsi-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Esempio semantico</title>
        
    </head>

    <!--consentono di organizzare la pagina in maniera più chiara e standardizzata-->
    <body>
        <header>
            <h1>Sito di esempio</h1>
        </header>

        <nav>
            <a href="#">Home</a>
            <a href="#">Contatti</a>
        </nav>

        <main>
            <section>
                <h2>Sezione principale</h2>
                <p>Contenuto della sezione.</p>
            </section>

            <article>
                <h2>Articolo</h2>
                <p>Testo di un contenuto indipendente</p>
            </article>
        </main>

        <footer>
            <p>Copyright 2026</p>
        </footer>

        <!--Tabbelle-->
        <table border="1"> <!--Definisce la struttura generale-->
            <thead> <!--contiene l'intestazione con celle th-->
                <tr>
                    <th>Nome</th> 
                    <th>Età</th>
                    <th>Ruolo</th>
                </tr>
            </thead>
            <tbody> <!--racchiude i dati effettivi nelle celle td, organizzate per righe tramite tr-->
                <tr>
                    <td>Mario</td>
                    <td>25</td>
                    <td>Studente</td>
                </tr>
                <tr>
                    <td>Laura</td>
                    <td>30</td>
                    <td>Docente</td>
                </tr>
            </tbody>
        </table>

    </body>
</html>
